<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碰撞与动量守恒</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; background: #0a0e1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { text-align: center; margin-bottom: 20px; }
    h1 { color: #58a6ff; margin: 0 0 8px 0; }
    a { color: #8b949e; text-decoration: none; }
    a:hover { color: #58a6ff; }
    main { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
    #canvas-container { line-height: 0; }
    canvas { max-width: 100%; height: auto; }
    .controls { width: 230px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
    .control-group { margin-bottom: 18px; }
    .control-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 14px; color: #c9d1d9; margin-bottom: 8px; }
    input[type="range"] { width: 100%; accent-color: #58a6ff; }
    .value { font-size: 13px; color: #8b949e; margin-top: 4px; }
    button { width: 100%; border: 1px solid #58a6ff; border-radius: 8px; background: #1f6feb; color: #fff; padding: 10px 12px; font-size: 14px; cursor: pointer; }
    button:hover { background: #2f81f7; }
    .hint { font-size: 13px; color: #8b949e; line-height: 1.5; margin-top: 12px; padding-top: 12px; border-top: 1px solid #30363d; }
    .explain { width: 100%; max-width: 950px; margin: 28px auto 0; }
    .explain .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 18px 22px; margin-bottom: 16px; }
    .explain h2 { color: #58a6ff; font-size: 1.05em; margin: 0 0 10px; }
    .explain p, .explain li { color: #c9d1d9; line-height: 1.7; font-size: 14px; }
    .explain p { margin: 0; }
    .explain ul { margin: 0; padding-left: 20px; }
    .lesson-nav { width: 100%; max-width: 950px; display: flex; justify-content: space-between; gap: 12px; margin: 26px auto 0; }
    .lesson-nav a { flex: 1; border: 1px solid #30363d; border-radius: 8px; background: #161b22; padding: 12px 14px; color: #c9d1d9; }
    .lesson-nav a:last-child { text-align: right; }
    .lesson-nav strong { display: block; color: #58a6ff; margin-top: 4px; }
    @media (max-width: 700px) { .lesson-nav { flex-direction: column; } .lesson-nav a:last-child { text-align: left; } }
  </style>
  <script src="../../vendor/p5.min.js"></script>
</head>
<body>
  <header>
    <h1>碰撞与动量守恒</h1>
    <p><a href="../../library.html">← 返回实验库</a></p>
  </header>
  <main>
    <div id="canvas-container"></div>
    <div class="controls">
      <div class="control-group">
        <label for="m1">左球质量</label>
        <input type="range" id="m1" min="1" max="10" value="4" step="0.5">
        <div class="value" id="m1-value">4 kg</div>
      </div>
      <div class="control-group">
        <label for="v1">左球速度</label>
        <input type="range" id="v1" min="1" max="10" value="6" step="0.5">
        <div class="value" id="v1-value">6 m/s</div>
      </div>
      <div class="control-group">
        <label for="m2">右球质量</label>
        <input type="range" id="m2" min="1" max="10" value="4" step="0.5">
        <div class="value" id="m2-value">4 kg</div>
      </div>
      <div class="control-group">
        <label for="offset">撞击偏心距</label>
        <input type="range" id="offset" min="-56" max="56" value="34" step="1">
        <div class="value" id="offset-value">34 px</div>
      </div>
      <div class="control-group">
        <label for="elastic">弹性系数</label>
        <input type="range" id="elastic" min="0" max="1" value="1" step="0.05">
        <div class="value" id="elastic-value">1</div>
      </div>
      <button id="restart" type="button">重新开始</button>
      <div class="hint">拖动参数不会打断当前一轮；点击重新开始会立即应用，下一轮也会自动应用新参数。</div>
    </div>
  </main>
  <section class="explain">
    <div class="card"><h2>原理解析</h2><p>碰撞过程中，如果外力很小，系统总动量近似守恒。二维碰撞要同时看 x、y 两个方向：偏心距决定接触法线方向，质量决定碰后速度分配。</p></div>
    <div class="card"><h2>观察任务</h2><ul><li>拖动参数，观察图形、读数或分布如何变化。</li><li>比较参数变大和变小时，现象趋势是否符合原理。</li><li>思考这个实验主要关联的基本物理量：质量 kg。</li></ul></div>
  </section>
  <nav class="lesson-nav">

  </nav>
  <script src="../../vendor/control-fix.js"></script>
  <script src="sketch.js?v=billiards-2d-7"></script>
</body>
</html>
